<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ברכוני</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {

      background: linear-gradient(135deg, #0052CC 0%, #0038B8 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

      text-align: center;
      max-width: 480px;
    }

    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      display: block;
      background: rgba(255,255,255,0.15);

      text-decoration: none;
      padding: 14px 24px;

      font-size: 16px;

    .links a:hover {
